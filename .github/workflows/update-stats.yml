name: Update DSA Stats

on:
  push:
    branches: [main]
    paths-ignore:
      - "STATS.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate STATS.md
        run: python3 scripts/generate_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STATS.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update STATS.md [skip ci]"
            git push
          else
            echo "No changes to STATS.md"
          fi
